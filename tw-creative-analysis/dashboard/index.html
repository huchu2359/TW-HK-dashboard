<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대만파트 자체컨텐츠 분석</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F2F4F6;--surface:#FFFFFF;--surface-alt:#F7F8FA;--border:#E5E8EB;
  --text:#191F28;--muted:#8B95A1;--muted2:#B0B8C1;
  --primary:#3182F6;--primary-dim:#EAF2FF;--primary-dark:#1B64DA;
  --success:#12B886;--success-dim:#E3FBF3;
  --danger:#F04452;--danger-dim:#FFEDEF;
  --warning:#FF9F1C;--warning-dim:#FFF3E0;
  --shadow:0 2px 10px rgba(25,31,40,.06),0 1px 2px rgba(25,31,40,.04);
  --shadow-lg:0 12px 32px rgba(25,31,40,.10),0 2px 6px rgba(25,31,40,.05);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#111318;--surface:#1A1D23;--surface-alt:#20242B;--border:#2B2F38;
    --text:#EDEFF2;--muted:#8B93A1;--muted2:#5B6270;
    --primary:#4C8DFF;--primary-dim:#16233D;--primary-dark:#7BAAFF;
    --success:#2BD9A8;--success-dim:#0F2F27;
    --danger:#FF6B75;--danger-dim:#341419;
    --warning:#FFB454;--warning-dim:#3A2A0F;
    --shadow:0 2px 10px rgba(0,0,0,.35),0 1px 2px rgba(0,0,0,.3);
    --shadow-lg:0 12px 32px rgba(0,0,0,.45),0 2px 6px rgba(0,0,0,.3);
  }
}
:root[data-theme="dark"]{
  --bg:#111318;--surface:#1A1D23;--surface-alt:#20242B;--border:#2B2F38;
  --text:#EDEFF2;--muted:#8B93A1;--muted2:#5B6270;
  --primary:#4C8DFF;--primary-dim:#16233D;--primary-dark:#7BAAFF;
  --success:#2BD9A8;--success-dim:#0F2F27;
  --danger:#FF6B75;--danger-dim:#341419;
  --warning:#FFB454;--warning-dim:#3A2A0F;
  --shadow:0 2px 10px rgba(0,0,0,.35),0 1px 2px rgba(0,0,0,.3);
  --shadow-lg:0 12px 32px rgba(0,0,0,.45),0 2px 6px rgba(0,0,0,.3);
}
:root[data-theme="light"]{
  --bg:#F2F4F6;--surface:#FFFFFF;--surface-alt:#F7F8FA;--border:#E5E8EB;
  --text:#191F28;--muted:#8B95A1;--muted2:#B0B8C1;
  --primary:#3182F6;--primary-dim:#EAF2FF;--primary-dark:#1B64DA;
  --success:#12B886;--success-dim:#E3FBF3;
  --danger:#F04452;--danger-dim:#FFEDEF;
  --warning:#FF9F1C;--warning-dim:#FFF3E0;
  --shadow:0 2px 10px rgba(25,31,40,.06),0 1px 2px rgba(25,31,40,.04);
  --shadow-lg:0 12px 32px rgba(25,31,40,.10),0 2px 6px rgba(25,31,40,.05);
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Segoe UI",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
a{color:var(--primary);text-decoration:none;}

/* ---------- topbar ---------- */
.topbar{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);}
.topbar-inner{max-width:1160px;margin:0 auto;padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;cursor:pointer;color:var(--text);letter-spacing:-.01em;flex-shrink:0;}
.brand .dot{width:22px;height:22px;border-radius:7px;background:linear-gradient(135deg,var(--primary),#7BB8FF);flex-shrink:0;}
.topnav{display:flex;gap:4px;}
.topnav button{background:none;border:none;font-family:inherit;font-size:14.5px;font-weight:600;color:var(--muted);
  padding:10px 16px;border-radius:10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.topnav button:hover{background:var(--surface-alt);color:var(--text);}
.topnav button.active{background:var(--primary-dim);color:var(--primary);}
.topbar-updated{font-size:11.5px;color:var(--muted2);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted2);flex-shrink:0;}
.sync-dot.live{background:var(--success);box-shadow:0 0 5px var(--success);}
.sync-dot.error{background:var(--danger);}

/* ---------- shell ---------- */
.shell{max-width:1160px;margin:0 auto;padding:0 28px 80px;}

/* ---------- hero (home) ---------- */
.hero{padding:96px 0 56px;text-align:center;}
.hero h1{font-size:44px;font-weight:800;line-height:1.28;letter-spacing:-.02em;margin:0 0 16px;text-wrap:balance;}
.hero h1 .accent{color:var(--primary);}
.hero p{font-size:17px;color:var(--muted);margin:0 auto 40px;max-width:520px;line-height:1.6;}
.hero-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:920px;margin:0 auto;}
@media(max-width:800px){.hero-tiles{grid-template-columns:repeat(2,1fr);}.hero h1{font-size:32px;}}
.hero-tile{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px 18px;text-align:left;box-shadow:var(--shadow);}
.hero-tile .l{font-size:12.5px;color:var(--muted);margin-bottom:6px;}
.hero-tile .v{font-size:24px;font-weight:800;letter-spacing:-.01em;}
.hero-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:920px;margin:44px auto 0;}
@media(max-width:800px){.hero-nav{grid-template-columns:repeat(2,1fr);}}
.hero-nav-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px 20px;text-align:left;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;}
.hero-nav-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.hero-nav-card .ic{font-size:26px;margin-bottom:10px;display:block;}
.hero-nav-card .t{font-weight:700;font-size:15px;margin-bottom:4px;}
.hero-nav-card .d{font-size:12.5px;color:var(--muted);line-height:1.5;}

/* ---------- page header ---------- */
.page-head{padding:40px 0 8px;}
.page-head h2{font-size:26px;font-weight:800;letter-spacing:-.01em;margin:0 0 6px;}
.page-head .sub{font-size:13.5px;color:var(--muted);}

/* ---------- generic ---------- */
.grid{display:grid;gap:14px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:900px){.grid.cols-4{grid-template-columns:repeat(2,1fr);}.grid.cols-3{grid-template-columns:repeat(2,1fr);}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);}
.card .label{font-size:12px;color:var(--muted);margin-bottom:6px;}
.card .big{font-size:23px;font-weight:800;letter-spacing:-.01em;}
.card .sub{font-size:12px;color:var(--muted);margin-top:5px;}
.section-title{font-size:16px;font-weight:800;margin:30px 0 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;letter-spacing:-.01em;}
.section-title .hint{font-size:12px;color:var(--muted);font-weight:500;}
.callout{background:var(--surface-alt);border:1px solid var(--border);border-radius:14px;padding:13px 16px;font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.55;}
.callout b{color:var(--text);}
.callout.warn{background:var(--warning-dim);border-color:transparent;color:var(--text);}
.callout.warn b{color:#B9660A;}
@media (prefers-color-scheme: dark){.callout.warn b{color:var(--warning);}}
:root[data-theme="dark"] .callout.warn b{color:var(--warning);}

.tag{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:700;white-space:nowrap;display:inline-block;}
.tag.success{background:var(--success-dim);color:var(--success);}
.tag.fail{background:var(--danger-dim);color:var(--danger);}
.tag.learning{background:var(--warning-dim);color:var(--warning);}
.tag.pending{background:var(--surface-alt);color:var(--muted);}
.tag.matched{background:var(--success-dim);color:var(--success);}
.tag.unmatched{background:var(--danger-dim);color:var(--danger);}
.tag.confirmed{background:var(--success-dim);color:var(--success);}
.tag.review{background:var(--warning-dim);color:var(--warning);}
.tag.benefit{background:var(--surface-alt);color:var(--text);font-weight:600;border:1px solid var(--border);}
.tag.sheet{background:var(--primary-dim);color:var(--primary);}
.tag.inferred{background:var(--surface-alt);color:var(--muted);}
.tag.stale{background:var(--warning-dim);color:var(--warning);}

table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:11px 12px;text-align:left;border-bottom:1px solid var(--border);}
th{color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.03em;}
td.num{text-align:right;font-variant-numeric:tabular-nums;}
tr:hover td{background:var(--surface-alt);}
.clickable{cursor:pointer;}
.name-link{color:var(--primary);font-weight:700;cursor:pointer;}

/* ---------- search ---------- */
.search-hero{padding:40px 0 8px;text-align:center;}
.search-box{position:relative;max-width:560px;margin:0 auto 8px;}
.search-box input{width:100%;background:var(--surface);border:2px solid var(--border);color:var(--text);
  border-radius:16px;padding:16px 20px 16px 46px;font-size:16px;font-family:inherit;box-shadow:var(--shadow);transition:border-color .15s;}
.search-box input:focus{outline:none;border-color:var(--primary);}
.search-box .ic{position:absolute;left:18px;top:17px;color:var(--muted);font-size:16px;}
.search-filters{display:flex;gap:8px;justify-content:center;margin:14px 0 28px;flex-wrap:wrap;}
.search-filters select{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;
  padding:8px 12px;font-size:12.5px;font-family:inherit;}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 20px;margin-bottom:10px;
  box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,box-shadow .12s;}
.result-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.result-card .rc-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.result-card .rc-name{font-weight:700;font-size:15px;}
.result-card .rc-meta{font-size:12px;color:var(--muted);}
.result-card .rc-stats{display:flex;gap:18px;font-size:12.5px;color:var(--muted);flex-wrap:wrap;}
.result-card .rc-stats b{color:var(--text);font-variant-numeric:tabular-nums;}
mark{background:var(--primary-dim);color:var(--primary);border-radius:3px;padding:0 2px;font-weight:700;}

.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-bar select,.filter-bar input{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;
  padding:8px 12px;font-size:12.5px;font-family:inherit;}
.filter-bar input{flex:1;min-width:160px;}
.filter-bar input::placeholder{color:var(--muted2);}

.barrow{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.barrow .bl{width:150px;font-size:12.5px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;}
.barrow .btrack{flex:1;height:12px;background:var(--surface-alt);border-radius:6px;overflow:hidden;}
.barrow .bfill{height:100%;border-radius:6px;}
.barrow .bnum{width:76px;text-align:right;font-size:12px;color:var(--muted);flex-shrink:0;font-variant-numeric:tabular-nums;}

select.inline{background:var(--surface-alt);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 8px;font-size:11.5px;font-family:inherit;}
[contenteditable]{outline:none;border-radius:6px;padding:2px 6px;margin:-2px -6px;}
[contenteditable]:hover{background:var(--surface-alt);}
[contenteditable]:focus{background:var(--primary-dim);box-shadow:0 0 0 1px var(--primary);}

/* ---------- lowperf ---------- */
.lowperf-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow);}
.lowperf-card .head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.lowperf-card .head .name{font-weight:800;font-size:15px;}
.lowperf-card .head .meta{font-size:12.5px;color:var(--muted);}
.lowperf-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:860px){.lowperf-grid{grid-template-columns:1fr;}}
.col-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:7px;}
.block-text{background:var(--surface-alt);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.6;white-space:pre-wrap;}
.ai-feedback{background:var(--primary-dim);border:1px solid transparent;border-radius:12px;padding:13px 15px;font-size:13px;line-height:1.65;}
.ai-feedback .fb-block{margin-bottom:10px;}
.ai-feedback .fb-block:last-child{margin-bottom:0;}
.ai-feedback b{color:var(--primary-dark);}

/* ---------- modal ---------- */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(20,22,28,.55);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px;padding:28px;width:min(640px,100%);max-height:86vh;overflow-y:auto;box-shadow:var(--shadow-lg);position:relative;}
.modal h3{margin:0 0 6px;font-size:19px;font-weight:800;letter-spacing:-.01em;}
.modal .modal-meta{font-size:12.5px;color:var(--muted);margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.modal .block-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin:16px 0 7px;}
.modal .kpi-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px;}
.modal .kpi-mini .item{background:var(--surface-alt);border-radius:12px;padding:10px 8px;text-align:center;}
.modal .kpi-mini .item .l{font-size:10px;color:var(--muted);}
.modal .kpi-mini .item .v{font-size:14px;font-weight:800;margin-top:3px;}
.modal .benefits{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 4px;}
.modal .noteedit{margin-top:16px;}
.modal-close{position:absolute;top:20px;right:22px;background:var(--surface-alt);border:none;color:var(--muted);
  width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;}
.modal-close:hover{background:var(--border);color:var(--text);}
.introwin-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.introwin-row .il{width:70px;font-size:11.5px;color:var(--muted);flex-shrink:0;}
.introwin-row .itrack{flex:1;height:10px;background:var(--surface-alt);border-radius:5px;overflow:hidden;}
.introwin-row .ifill{height:100%;border-radius:5px;background:var(--primary);}
.introwin-row .ifill.loser{background:var(--surface-alt);border:1px solid var(--border);}
.introwin-row .inum{width:84px;text-align:right;font-size:11.5px;color:var(--muted);flex-shrink:0;font-variant-numeric:tabular-nums;}

.toast{position:fixed;bottom:26px;right:26px;background:var(--text);color:var(--bg);border-radius:12px;padding:12px 18px;
  font-size:13px;font-weight:600;z-index:300;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;box-shadow:var(--shadow-lg);}
.toast.show{opacity:1;transform:translateY(0);}
.toast.err{background:var(--danger);color:#fff;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand" id="brand-home"><span class="dot"></span>대만/홍콩 자체컨텐츠 분석</div>
    <div class="topnav" id="region-nav">

<div class="shell" id="shell"></div>

<div class="modal-overlay" id="modal-overlay">

</div>

    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    setSyncStatus('', '연결 중...');
    db.collection(FS_COLLECTION).doc(FS_DOC).onSnapshot(snap=>{
      if(snap.exists){
        const d = snap.data();
        DATA = d.regions ? d : { regions: { "대만": d, "홍콩": SEED_DATA.regions["홍콩"] }, dailyLog: d.dailyLog || SEED_DATA.dailyLog };
      }
      else{ db.collection(FS_COLLECTION).doc(FS_DOC).set(SEED_DATA); }
      setSyncStatus('live', '실시간 공유중');
      renderRoute();
    }, e=>{ console.error(e); offline = true; setSyncStatus('error','연결 오류 · 로컬 데이터'); renderRoute(); });
  }catch(e){
    console.error(e); offline = true;
    setSyncStatus('error', '오프라인 · 로컬 데이터');
    renderRoute();
  }
}

/* ===================== UTILS ===================== */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function won(n){ return n==null ? '—' : '₩'+Math.round(n).toLocaleString(); }
function num(n){ return n==null ? '—' : n.toLocaleString(); }
function pct(n){ return n==null ? '—' : n.toFixed(2)+'%'; }
function roasFmt(n){ return n==null ? '—' : n.toFixed(2); }
function verdictTag(v){
  const cls = v==='성공'?'success':v==='실패'?'fail':v==='학습중'?'learning':'pending';
  return `<span class="tag ${cls}">${esc(v)}</span>`;
}
function matchTag(m){
  const cls = m==='매칭됨'?'matched':m==='매칭안됨'?'unmatched':'pending';
  return `<span class="tag ${cls}">${esc(m)}</span>`;
}
function approvalTag(a){
  if(!a) return `<span class="tag pending">—</span>`;
  const cls = a==='확정'?'confirmed':a==='검수대기'?'review':'fail';
  return `<span class="tag ${cls}">${esc(a)}</span>`;
}
function brandColor(b){ return b==='셀라딕스'?'#3182F6':b==='락토메디'?'#12B886':b==='엑스퍼트리션'?'#FF9F1C':'#8B95A1'; }
function perfFor(name, brand){ return REG().performance.find(p=>p.concept===name && p.brand===brand) || null; }
function scriptByKey(name, brand){ return REG().scripts.find(s=>s.name===name && s.brand===brand); }
const BRANDS_BY_REGION = { "대만": ["셀라딕스","락토메디","엑스퍼트리션"], "홍콩": ["셀라딕스"] };
function BRANDS(){ return BRANDS_BY_REGION[currentRegion]; }
let searchTerm = '';
let currentTab = 'home';

function highlight(name){
  const e = esc(name);
  if(!searchTerm) return e;
  const idx = e.toLowerCase().indexOf(esc(searchTerm).toLowerCase());
  if(idx<0) return e;
  return e.slice(0,idx) + '<mark>' + e.slice(idx, idx+searchTerm.length) + '</mark>' + e.slice(idx+searchTerm.length);
}

    Object.keys(ip.intros).sort().forEach(k=>{

    ${s.i3?`<div class="block-label">인트로 3</div><div class="block-text">${esc(s.i3)}</div>`:''}

    </div>`;
  body.innerHTML = html;

  const ne = document.getElementById('note-edit');
  ne.addEventListener('blur', ()=>{
    const sc = scriptByKey(ne.dataset.name, ne.dataset.brand);
    if(sc){ sc.note = ne.textContent.trim(); saveData(); }
  });
  document.getElementById('modal-verdict-sel').addEventListener('change', e=>{ s.verdict = e.target.value; saveData(); renderRoute(); });
  document.getElementById('modal-approval-sel').addEventListener('change', e=>{ s.approval = e.target.value || null; saveData(); renderRoute(); });
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e=>{ if(e.target.id==='modal-overlay') closeModal(); });

/* ===================== AGGREGATES ===================== */
function brandStats(brand){
  const rows = REG().performance.filter(r=>r.brand===brand && !r.isCampaignLevel);
  const roasRows = rows.filter(r=>r.roas!=null);
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  return {
    count: rows.length,
    spend: rows.reduce((a,r)=>a+r.spend,0),
    purchases: rows.reduce((a,r)=>a+r.purchases,0),
    avgCtr: avg(rows.map(r=>r.ctr)),
    avgCpc: avg(rows.map(r=>r.cpc)),
    avgRoas: avg(roasRows.map(r=>r.roas)),
    successCount: REG().scripts.filter(s=>s.brand===brand && s.verdict==='성공').length,
    learningCount: REG().scripts.filter(s=>s.brand===brand && s.verdict==='학습중').length,
  };
}

/* ===================== 검색 ===================== */
function renderSearch(){
  const brands = ['전체', ...BRANDS()];
  let html = `
  <div class="search-hero">
    <div class="search-box"><span class="ic">🔍</span><input id="search-input" type="text" placeholder="소재명으로 검색... (예: 왜정가주고사)" value="${esc(searchTerm)}" /></div>
    <div class="search-filters">
      <select id="f-brand">${brands.map(b=>`<option>${esc(b)}</option>`).join('')}</select>
      <select id="f-verdict">${['전체','성공','실패','학습중','미판정'].map(v=>`<option>${esc(v)}</option>`).join('')}</select>
      <select id="f-match">${['전체','매칭됨','매칭안됨','미시도'].map(v=>`<option>${esc(v)}</option>`).join('')}</select>
    </div>
  </div>
  <div id="search-results"></div>`;
  document.getElementById('shell').innerHTML = html;

  function draw(){
    const fb = document.getElementById('f-brand').value;
    const fv = document.getElementById('f-verdict').value;
    const fm = document.getElementById('f-match').value;
    const term = searchTerm.trim().toLowerCase();
    const rows = REG().scripts.filter(s =>
      (fb==='전체'||s.brand===fb) &&
      (fv==='전체'||s.verdict===fv) &&
      (fm==='전체'||s.match===fm) &&
      (!term || s.name.toLowerCase().includes(term))
    );
    const box = document.getElementById('search-results');
    if(!rows.length){ box.innerHTML = `<div class="callout" style="text-align:center;">검색 결과가 없습니다.</div>`; return; }
    box.innerHTML = rows.map(s=>{
      const p = perfFor(s.name, s.brand);
      const ip = REG().introPerf[s.name];
      return `<div class="result-card" data-name="${esc(s.name)}" data-brand="${esc(s.brand)}">
        <div class="rc-head">
          <span class="rc-name">${highlight(s.name)}</span>
          ${matchTag(s.match)} ${verdictTag(s.verdict)} ${s.approval?approvalTag(s.approval):''}
        </div>
        <div class="rc-meta">${esc(s.brand)} · ${esc(s.product)}${ip?` · 승자 인트로${ip.winner}${ip.confident?'':'(근소)'}`:''}</div>
        ${p ? `<div class="rc-stats" style="margin-top:8px;">
          <span>지출 <b>${won(p.spend)}</b></span>
          <span>ROAS <b>${roasFmt(p.roas)}</b></span>
          <span>CTR <b>${pct(p.ctr)}</b></span>
          <span>CPC <b>${p.cpc?won(p.cpc):'—'}</b></span>
          <span>CPA <b>${p.cpa?won(p.cpa):'—'}</b></span>
          <span>구매 <b>${num(p.purchases)}</b></span>
          ${p.stale?'<span class="tag stale">최근 확인 안됨</span>':''}
        </div>` : `<div class="rc-meta" style="margin-top:6px;">아직 성과 데이터 없음</div>`}
      </div>`;
    }).join('');
    box.querySelectorAll('.result-card').forEach(el=>{
      el.addEventListener('click', ()=>openScriptModal(el.dataset.name, el.dataset.brand));
    });
  }
  document.getElementById('search-input').addEventListener('input', e=>{ searchTerm = e.target.value; draw(); });
  document.getElementById('f-brand').addEventListener('change', draw);
  document.getElementById('f-verdict').addEventListener('change', draw);
  document.getElementById('f-match').addEventListener('change', draw);
  draw();
  setTimeout(()=>document.getElementById('search-input').focus(), 50);
}

/* ===================== 메타현황판 ===================== */
function renderMeta(){
  if(!REG().scripts.length){
    document.getElementById('shell').innerHTML = `<div class="page-head"><h2>메타현황판</h2></div><div class="callout warn">${REG().dataIssues && REG().dataIssues[0] ? `<b>${esc(REG().dataIssues[0].issue)}</b> — ${esc(REG().dataIssues[0].detail)}` : esc(currentRegion)+' 데이터가 아직 없습니다.'}</div>`;
    return;
  }
  const total = REG().scripts.length;
  const matched = REG().scripts.filter(s=>s.match==='매칭됨').length;
  const unmatched = REG().scripts.filter(s=>s.match==='매칭안됨').length;
  const pctMatched = (matched+unmatched) ? (matched/(matched+unmatched)*100).toFixed(1) : null;
  const staleCount = REG().performance.filter(p=>p.stale).length;
  let html = `<div class="page-head"><h2>메타현황판</h2><div class="sub">매칭 현황과 메타 성과를 최신 상태로 유지합니다 · 기준일 ${esc(REG().generatedAt)}</div></div>`;
  html += `<div class="grid cols-4">
    <div class="card"><div class="label">전체 매칭률</div><div class="big" style="color:${pctMatched==null?'var(--muted)':pctMatched>=50?'var(--success)':'var(--danger)'}">${pctMatched==null?'—':pctMatched+'%'}</div><div class="sub">${pctMatched==null?'데이터 없음':'기준선 50% '+(pctMatched>=50?'통과':'미달')}</div></div>
    <div class="card"><div class="label">매칭됨</div><div class="big" style="color:var(--success)">${matched}건</div></div>
    <div class="card"><div class="label">매칭안됨</div><div class="big" style="color:var(--danger)">${unmatched}건</div></div>
    <div class="card"><div class="label">최근 확인 안됨</div><div class="big" style="color:${staleCount?'var(--warning)':'var(--success)'}">${staleCount}건</div><div class="sub">재조회 시 광고 없음</div></div>
  </div>`;

  html += `<div class="section-title">브랜드별 매칭 현황</div><div class="card"><table>
    <tr><th>브랜드</th><th class="num">매칭됨</th><th class="num">매칭안됨</th><th class="num">매칭률</th></tr>`;
  BRANDS().forEach(b=>{
    const m = REG().scripts.filter(s=>s.brand===b && s.match==='매칭됨').length;
    const u = REG().scripts.filter(s=>s.brand===b && s.match==='매칭안됨').length;
    const r = (m+u)? (m/(m+u)*100).toFixed(1) : '—';
    html += `<tr><td>${esc(b)}</td><td class="num">${m}</td><td class="num">${u}</td><td class="num">${r}${r!=='—'?'%':''}</td></tr>`;
  });
  html += `</table></div>`;

  html += `<div class="section-title">매칭된 소재 — 최신 성과 <span class="hint">클릭하면 상세 보기</span></div>
  <div class="card" style="overflow-x:auto;"><table id="meta-matched-table">
    <tr><th>컨셉명</th><th>브랜드</th><th class="num">지출</th><th class="num">ROAS</th><th class="num">CTR</th><th class="num">구매</th><th>상태</th></tr>
    ${REG().scripts.filter(s=>s.match==='매칭됨').map(s=>{
      const p = perfFor(s.name, s.brand);
      return `<tr class="clickable" data-name="${esc(s.name)}" data-brand="${esc(s.brand)}">
        <td class="name-link">${esc(s.name)}</td><td>${esc(s.brand)}</td>
        <td class="num">${p?won(p.spend):'—'}</td><td class="num">${p?roasFmt(p.roas):'—'}</td><td class="num">${p?pct(p.ctr):'—'}</td><td class="num">${p?num(p.purchases):'—'}</td>
        <td>${p&&p.stale?'<span class="tag stale">최근 확인 안됨</span>':'<span class="tag success">최신</span>'}</td>
      </tr>`;
    }).join('')}
  </table></div>`;

  html += `<div class="section-title">매칭안됨 소재 <span class="hint">수동 확인 필요</span></div><div class="card"><table>
    <tr><th>컨셉명</th><th>브랜드</th><th>제품</th></tr>` +
    REG().scripts.filter(s=>s.match==='매칭안됨').map(s=>`<tr><td>${esc(s.name)}</td><td>${esc(s.brand)}</td><td>${esc(s.product)}</td></tr>`).join('') +
    `</table></div>`;

  const confirmed = REG().scripts.filter(s=>s.approval==='확정');
  if(confirmed.length){
    html += `<div class="section-title">✔ 확정된 개선안</div><div class="card"><table>
      <tr><th>컨셉명</th><th>브랜드</th><th>제품</th></tr>
      ${confirmed.map(s=>`<tr><td>${esc(s.name)}</td><td>${esc(s.brand)}</td><td>${esc(s.product)}</td></tr>`).join('')}
    </table></div>`;
  }

  html += `<div class="section-title">⚠ 데이터 매핑 이슈</div>`;
  REG().dataIssues.forEach(d=>{ html += `<div class="callout warn"><b>${esc(d.issue)}</b> — ${esc(d.detail)}</div>`; });

  document.getElementById('shell').innerHTML = html;
  document.getElementById('meta-matched-table').addEventListener('click', e=>{
    const tr = e.target.closest('tr.clickable'); if(!tr) return;
    openScriptModal(tr.dataset.name, tr.dataset.brand);
  });
}

      <td class="name-link">${esc(r.concept)}${r.stale?' <span class="tag stale">최근확인안됨</span>':''}${r.isCampaignLevel?' <span class="tag pending" title="'+esc(r.campaignNote||'')+'">캠페인 합계</span>':''}</td><td>${esc(r.brand)}</td>
      <td class="num">${won(r.spend)}</td><td class="num">${r.cpc?won(r.cpc):'—'}</td><td class="num">${r.cpa?won(r.cpa):'—'}</td>
      <td class="num">${roasFmt(r.roas)}</td><td class="num">${pct(r.ctr)}</td><td class="num">${num(r.purchases)}</td>
    </tr>`).join('')}
  </table></div>`;

  document.getElementById('shell').innerHTML = html;
  document.getElementById('trend-bars').addEventListener('click', e=>{

/* ===================== 저효율 인트로+개선방안 ===================== */
function renderLowPerf(){
  if(!Object.keys(REG().introPerf).length){
    document.getElementById('shell').innerHTML = `<div class="page-head"><h2>저효율 인트로+개선방안</h2></div><div class="callout warn">${esc(currentRegion)} 인트로 비교 데이터가 아직 없습니다.</div>`;
    return;
  }
  const rows = Object.entries(REG().introPerf).map(([name, ip])=>{
    const introNums = Object.keys(ip.intros).map(Number);
    const loserNum = introNums.filter(n=>n!==ip.winner).sort((a,b)=>ip.intros[a].spend-ip.intros[b].spend)[0];
    const loser = ip.intros[String(loserNum)];
    const winnerData = ip.intros[String(ip.winner)];
    const sc = REG().scripts.find(s=>s.name===name);
    const loserText = sc ? (loserNum===1?sc.i1:loserNum===2?sc.i2:sc.i3) : '';
    const winnerText = sc ? (ip.winner===1?sc.i1:ip.winner===2?sc.i2:sc.i3) : '';
    const shareOfWinner = winnerData.spend ? (loser.spend/winnerData.spend*100) : 0;
    return {name, brand:sc?sc.brand:'', loserNum, loser, loserText, winnerNum:ip.winner, winnerText, marginPct:ip.marginPct, confident:ip.confident, shareOfWinner, stale:ip.stale};
  }).sort((a,b)=> a.confident===b.confident ? b.marginPct-a.marginPct : (a.confident? -1:1) );

  let html = `<div class="page-head"><h2>저효율 인트로 + 개선방안</h2><div class="sub">각 소재의 여러 인트로 중 반응이 가장 저조했던 인트로를 승자와 비교합니다. AI 피드백은 사람 검수 없이 바로 게재된 참고용 분석입니다.</div></div>`;
  html += `<div class="callout">표본이 너무 작은 경우(노출 매우 적음)는 창작 문제가 아니라 예산 배분 문제일 수 있어 "표본 부족"으로 별도 표시했습니다.</div>`;
  rows.forEach(r=>{
    const fb = REG().lowPerfFeedback[r.name];
    html += `<div class="lowperf-card">
      <div class="head">
        <span class="name clickable" data-name="${esc(r.name)}" data-brand="${esc(r.brand)}" style="cursor:pointer;color:var(--primary);">${esc(r.name)}</span>
        <span class="meta">${esc(r.brand)} · 인트로${r.loserNum} 지출 ${won(r.loser.spend)} (승자 인트로${r.winnerNum}의 ${r.shareOfWinner.toFixed(0)}% 수준)
        ${r.confident?'':'<span class="tag learning" style="margin-left:6px;">격차 15% 미만 · 근소</span>'}
        ${fb && !fb.reliable?'<span class="tag pending" style="margin-left:6px;">표본 부족 주의</span>':''}
        ${r.stale?'<span class="tag stale" style="margin-left:6px;">최근 확인 안됨</span>':''}</span>
      </div>
      <div class="lowperf-grid">
        <div>
          <div class="col-label">저효율 인트로${r.loserNum}</div>
          <div class="block-text" style="margin-bottom:10px;">${esc(r.loserText||'')}</div>
          <div class="col-label">승자 인트로${r.winnerNum} (비교용)</div>
          <div class="block-text" style="opacity:.7;">${esc(r.winnerText||'')}</div>
        </div>
        <div>
          <div class="col-label">🤖 AI 피드백</div>
          <div class="ai-feedback">
            <div class="fb-block"><b>왜 저조했는지</b><br>${esc(fb?fb.reason:'분석 데이터 없음')}</div>
            <div class="fb-block"><b>이렇게 수정해보세요</b><br>${esc(fb?fb.suggestion:'')}</div>
          </div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('shell').innerHTML = html;
  document.querySelectorAll('.lowperf-card .name.clickable').forEach(el=>{
    el.addEventListener('click', ()=>openScriptModal(el.dataset.name, el.dataset.brand));
  });
}

/* ===================== 일별/주별/월별/연별 추이 ===================== */
let dailyPeriod = 'day';
let dailyChartInstance = null;

function todayStr(){ const d=new Date(); return d.toISOString().slice(0,10); }
function isoWeek(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const target = new Date(d.valueOf());
  const dayNr = (d.getDay()+6)%7;
  target.setDate(target.getDate()-dayNr+3);
  const firstThursday = new Date(target.getFullYear(),0,4);
  const diff = (target - firstThursday)/86400000;
  const week = 1+Math.floor(diff/7);
  return target.getFullYear()+'-W'+String(week).padStart(2,'0');
}
function bucketOf(dateStr, period){
  if(period==='day') return dateStr;
  if(period==='week') return isoWeek(dateStr);
  if(period==='month') return dateStr.slice(0,7);
  return dateStr.slice(0,4);
}
function recordDailySnapshot(){
  const region = currentRegion;
  const rows = REG().performance;
  if(!rows.length){ toast('기록할 성과 데이터가 없습니다', true); return; }
  const date = todayStr();
  if(!DATA.dailyLog[region]) DATA.dailyLog[region] = [];
  rows.forEach(r=>{
    const idx = DATA.dailyLog[region].findIndex(e=>e.date===date && e.concept===r.concept && e.brand===r.brand);
    const entry = {date, brand:r.brand, concept:r.concept, impressions:r.impressions, clicks:r.clicks,
      spend:r.spend, purchases:r.purchases, ctr:r.ctr, cpm:r.cpm, cpc:r.cpc, cpa:r.cpa, roas:r.roas};
    if(idx>=0) DATA.dailyLog[region][idx] = entry; else DATA.dailyLog[region].push(entry);
  });
  saveData();
  toast(`${date} 스냅샷 기록 완료 (${rows.length}건)`);
  renderDaily();
}

function renderDaily(){
  const log = DATA.dailyLog[currentRegion] || [];
  let html = `<div class="page-head"><h2>일별/주별/월별/연별 추이</h2><div class="sub">2주 단위 조회 사이 공백 없이, 매일 쌓이는 누적 데이터로 추이를 봅니다</div></div>`;
  html += `<div class="callout">데이터는 자동으로 매일 쌓이지 않고, 아래 <b>"오늘 스냅샷 기록"</b> 버튼을 하루 한 번 눌러야 그날 데이터가 누적됩니다. (정기 자동화는 상시 서버가 필요해 추후 검토 항목)</div>`;
  html += `<div class="filter-bar">
    <select id="daily-period">
      ${[['day','일단위'],['week','주단위'],['month','월단위'],['year','연단위']].map(([v,l])=>`<option value="${v}" ${dailyPeriod===v?'selected':''}>${l}</option>`).join('')}
    </select>
    <select id="daily-brand"><option value="전체">전체 브랜드</option>${BRANDS().map(b=>`<option>${esc(b)}</option>`).join('')}</select>
    <button id="daily-snapshot-btn" style="background:var(--primary);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:12.5px;font-weight:700;cursor:pointer;">+ 오늘 스냅샷 기록</button>
  </div>`;

  if(!log.length){
    html += `<div class="callout warn"><b>누적된 일별 데이터가 없습니다.</b> "오늘 스냅샷 기록" 버튼을 눌러 첫 데이터를 쌓아보세요.</div>`;
    document.getElementById('shell').innerHTML = html;
    document.getElementById('daily-snapshot-btn').addEventListener('click', recordDailySnapshot);
    return;
  }

  html += `<div class="card"><canvas id="daily-chart" height="90"></canvas></div>`;
  html += `<div class="section-title">구간별 지표 <span class="hint">지출 · 구매 · 평균 ROAS</span></div>
  <div class="card" style="overflow-x:auto;"><table id="daily-table"></table></div>`;
  document.getElementById('shell').innerHTML = html;

  function draw(){
    const period = document.getElementById('daily-period').value;
    const brandFilter = document.getElementById('daily-brand').value;
    dailyPeriod = period;
    const filtered = log.filter(e=> brandFilter==='전체' || e.brand===brandFilter);
    const buckets = {};
    filtered.forEach(e=>{
      const key = bucketOf(e.date, period);
      if(!buckets[key]) buckets[key] = {spend:0, purchases:0, roasSum:0, roasCount:0};
      buckets[key].spend += e.spend||0;
      buckets[key].purchases += e.purchases||0;
      if(e.roas!=null){ buckets[key].roasSum += e.roas; buckets[key].roasCount++; }
    });
    const keys = Object.keys(buckets).sort();
    const spendData = keys.map(k=>buckets[k].spend);
    const roasData = keys.map(k=>buckets[k].roasCount? +(buckets[k].roasSum/buckets[k].roasCount).toFixed(2) : null);

    const ctx = document.getElementById('daily-chart').getContext('2d');
    if(dailyChartInstance) dailyChartInstance.destroy();
    dailyChartInstance = new Chart(ctx, {
      data: {
        labels: keys,
        datasets: [
          {type:'bar', label:'지출(₩)', data:spendData, backgroundColor:'rgba(49,130,246,.35)', yAxisID:'y'},
          {type:'line', label:'평균 ROAS', data:roasData, borderColor:'#12B886', backgroundColor:'#12B886', yAxisID:'y1', tension:.3}
        ]
      },
      options: {
        responsive:true,
        scales:{
          y:{position:'left', title:{display:true,text:'지출(₩)'}},
          y1:{position:'right', title:{display:true,text:'ROAS'}, grid:{drawOnChartArea:false}}
        }
      }
    });

    const table = document.getElementById('daily-table');
    table.innerHTML = `<tr><th>구간</th><th class="num">지출</th><th class="num">구매</th><th class="num">평균 ROAS</th></tr>` +
      keys.slice().reverse().map(k=>`<tr><td>${esc(k)}</td><td class="num">${won(buckets[k].spend)}</td><td class="num">${num(buckets[k].purchases)}</td><td class="num">${buckets[k].roasCount?roasFmt(buckets[k].roasSum/buckets[k].roasCount):'—'}</td></tr>`).join('');
  }
  document.getElementById('daily-period').addEventListener('change', draw);
  document.getElementById('daily-brand').addEventListener('change', draw);
  document.getElementById('daily-snapshot-btn').addEventListener('click', recordDailySnapshot);
  draw();
}

/* ===================== ROUTER ===================== */
const RENDERERS = { home: renderHome, search: renderSearch, meta: renderMeta, trend: renderTrend, daily: renderDaily, lowperf: renderLowPerf };
function renderRoute(){ (RENDERERS[currentTab] || renderHome)(); }
function goTab(tab){
  currentTab = tab;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('active', x.dataset.tab===tab));
  renderRoute();
  window.scrollTo(0,0);
}
document.getElementById('nav').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  goTab(b.dataset.tab);
});
document.getElementById('region-nav').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  currentRegion = b.dataset.region;
  document.querySelectorAll('#region-nav button').forEach(x=>x.classList.toggle('active', x.dataset.region===currentRegion));
  currentTab = 'home';
  document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('active'));
  renderRoute(); window.scrollTo(0,0);
});
document.getElementById('brand-home').addEventListener('click', ()=>{
  document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('active'));
  currentTab = 'home'; renderRoute(); window.scrollTo(0,0);
});

renderHome();
initFirebase();
</script>
